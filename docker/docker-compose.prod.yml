# Coffee Manager — despliegue de producción (piloto).
# Uso:  docker compose --env-file ../.env.prod -f docker-compose.prod.yml up -d --build
# (o usa el helper ../docker/deploy.sh). Ver docs/DESPLIEGUE-ORACLE.md.
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Sin `ports`: la base solo es accesible dentro de la red de Docker.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      PORT: 3001
      # Secretos JWT que la API realmente lee (config/jwt).
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-30m}
      JWT_PLATFORM_SECRET: ${JWT_PLATFORM_SECRET}
      JWT_PLATFORM_EXPIRES_IN: ${JWT_PLATFORM_EXPIRES_IN:-8h}
      JWT_REFRESH_EXPIRES_IN_DAYS: ${JWT_REFRESH_EXPIRES_IN_DAYS:-30}
      # Super-admin de plataforma que crea el seed en el primer arranque (upsert).
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD}
      PLATFORM_ADMIN_NOMBRE: ${PLATFORM_ADMIN_NOMBRE:-Administrador}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        # Debe apuntar al host PÚBLICO de la API (se hornea en el build del front).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
